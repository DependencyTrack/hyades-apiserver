syntax = "proto3";

package org.dependencytrack.dex.workflow.v1;

import "org/dependencytrack/filestorage/v1/filestorage.proto";
import "org/dependencytrack/notification/v1/notification.proto";

option java_multiple_files = true;
option java_package = "org.dependencytrack.dex.workflow.proto.v1";

message DeleteFilesArgument {
  // Metadata of files to delete.
  repeated org.dependencytrack.filestorage.v1.FileMetadata file_metadata = 1;
}

message PublishNotificationArgument {
  // ID of the notification.
  string notification_id = 1;

  // ID of the notification rule.
  int64 rule_id = 2;

  // Name of the notification rule.
  string rule_name = 3;

  // The notification payload.
  oneof payload {
    // The notification itself. Will be used for notifications of size 128KiB or less.
    org.dependencytrack.notification.v1.Notification notification = 4;

    // File metadata of the notification. Will be used for large notifications exceeding 128KiB.
    org.dependencytrack.filestorage.v1.FileMetadata notification_file_metadata = 5;
  }
}