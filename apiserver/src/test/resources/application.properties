# Reduce to the lowest possible value to prevent
# excessive CPU usage during tests.
dt.bcrypt.rounds=4

# Use port 0 to let the OS assign an available port during tests.
dt.management.port=0

# Use a pre-generated secret key to avoid issues with
# key generation during parallel test execution.
# In actual deployments, parallel key generation is
# prevented with a PostgreSQL advisory lock.
dt.secret.key.path=src/test/resources/secret.key
