    externalDocs:
      description: Project Documentation
      url: https://docs.dependencytrack.org/
  servers:
  - url: /api
  components:
    securitySchemes:
      ApiKeyAuth:
        name: X-Api-Key
        type: apiKey
        in: header
      BearerAuth:
        type: http
        scheme: Bearer
      ApiKeyQueryAuth:
        name: apiKey
        type: apiKey
        in: query
