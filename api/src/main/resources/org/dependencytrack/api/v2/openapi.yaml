openapi: 3.0.0
info:
  title: OWASP Dependency-Track
  description: REST API of OWASP Dependency-Track
  version: 2.0.0
  contact:
    name: The Dependency-Track Authors
    email: dependencytrack@owasp.org
    url: https://github.com/DependencyTrack/dependency-track
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0.html
security:
- apiKeyAuth: [ ]
- bearerAuth: [ ]
servers:
- url: /api/v2
tags:
- name: foo
  description: bar
paths: { }
components:
  schemas:
    problemDetails:
      type: object
      description: An RFC 9457 problem object
      properties:
        type:
          type: string
          format: uri
          maxLength: 1024
          description: A URI reference that identifies the problem type
          example: https://api.example.org/foo/bar/example-problem
        status:
          type: integer
          format: int32
          description: HTTP status code generated by the origin server for this occurrence of the problem
          minimum: 400
          maximum: 599
          example: 401
        title:
          type: string
          maxLength: 1024
          pattern: ^[\w ]+$
          description: Short, human-readable summary of the problem type
          example: Example title
        detail:
          type: string
          maxLength: 1024
          pattern: ^[\w ]+$
          description: Human-readable explanation specific to this occurrence of the problem
          example: Example detail
        instance:
          type: string
          format: uri
          maxLength: 1024
          description: Reference URI that identifies the specific occurrence of the problem
          example: https://api.example.org/foo/bar/example-instance
      required:
      - status
      - title
      - detail
  securitySchemes:
    apiKeyAuth:
      name: X-Api-Key
      description: Authentication via API key
      type: apiKey
      in: header
    bearerAuth:
      description: Authentication via Bearer token
      type: http
      scheme: Bearer

