get:
  operationId: listVulnPolicies
  summary: List vulnerability policies
  description: |-
    Returns a paginated list of vulnerability policies, sorted by priority
    (ascending) and name (ascending).

    Reports `EXACT` total counts for up to 500 items, and `AT_LEAST` past that.

    Requires permission `POLICY_MANAGEMENT` or `POLICY_MANAGEMENT_READ`.
  tags:
  - Vulnerability Policies
  parameters:
  - $ref: "../components/parameters/pagination-limit.yaml"
  - $ref: "../components/parameters/page-token.yaml"
  - name: name
    in: query
    description: Filter by name (partial match, case-insensitive)
    schema:
      type: string
  responses:
    "200":
      description: Paginated list of vulnerability policies
      content:
        application/json:
          schema:
            $ref: "../components/schemas/vuln-policies/list-vuln-policies-response.yaml"
    "400":
      $ref: "../components/responses/invalid-request-error.yaml"
    "401":
      $ref: "../components/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../components/responses/generic-forbidden-error.yaml"
    default:
      $ref: "../components/responses/generic-error.yaml"

post:
  operationId: createVulnPolicy
  summary: Create a vulnerability policy
  description: |-
    Creates a user-managed vulnerability policy.

    CEL conditions are compiled server-side. On compilation failure,
    a 400 response with structured error details is returned.

    Requires permission `POLICY_MANAGEMENT` or `POLICY_MANAGEMENT_CREATE`.
  tags:
  - Vulnerability Policies
  requestBody:
    required: true
    content:
      application/json:
        schema:
          $ref: "../components/schemas/vuln-policies/create-vuln-policy-request.yaml"
  responses:
    "201":
      description: Policy created
      headers:
        Location:
          description: URL of the created policy
          schema:
            type: string
            format: uri
      content:
        application/json:
          schema:
            type: object
            properties:
              uuid:
                type: string
                format: uuid
            required:
            - uuid
    "400":
      description: Bad Request
      content:
        application/problem+json:
          schema:
            anyOf:
            - $ref: "../components/schemas/invalid-vuln-policy-condition-problem-details.yaml"
            - $ref: "../components/schemas/invalid-request-problem-details.yaml"
            - $ref: "../components/schemas/problem-details.yaml"
    "401":
      $ref: "../components/responses/generic-unauthorized-error.yaml"
    "403":
      $ref: "../components/responses/generic-forbidden-error.yaml"
    "409":
      $ref: "../components/responses/generic-conflict-error.yaml"
    default:
      $ref: "../components/responses/generic-error.yaml"
