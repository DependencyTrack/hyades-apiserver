get:
  operationId: getTeamMembers
  summary: Get all members of a team
  description: >-
    Returns a paginated list of users that are member of the given team,
    sorted by username in ascending order.
  tags:
  - Teams
  parameters:
  - name: name
    description: Name of the team.
    in: path
    required: true
    schema:
      type: string
  - $ref: "../components/parameters/pagination-limit.yaml"
  - $ref: "../components/parameters/page-token.yaml"
  responses:
    "200":
      description: foo
      content:
        application/json:
          schema:
            $ref: "../components/schemas/list-team-members-response.yaml"
    "400":
      $ref: "../components/responses/invalid-request-error.yaml"
    "401":
      $ref: "../components/responses/generic-unauthorized-error.yaml"
    "404":
      $ref: "../components/responses/generic-not-found-error.yaml"
    default:
      $ref: "../components/responses/generic-error.yaml"